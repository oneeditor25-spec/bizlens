<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyze a Product — BizLens</title>
  <meta name="description" content="AI-powered business & marketing intelligence for any product or brand. Powered by Claude and Gemini.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://yourdomain.com/analyze">
  <meta property="og:title" content="Analyze a Product — BizLens">
  <meta property="og:description" content="Instant business strategy analysis powered by Claude & Gemini.">
  <meta property="og:image" content="https://yourdomain.com/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a08; --surface: #111110; --border: #222220;
      --accent: #e8ff47; --accent2: #ff6b35; --accent3: #47b8ff;
      --text: #e8e6e0; --muted: #6b6960; --success: #4dff91;
      --claude: #cc785c;   /* Anthropic warm terra */
      --gemini: #4285f4;   /* Google blue */
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1000; opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border); padding: 0 40px; height: 60px;
      display: flex; align-items: center; gap: 16px; position: sticky; top: 0;
      background: rgba(10,10,8,0.95); backdrop-filter: blur(20px); z-index: 100;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--accent); text-decoration: none; }
    .back-link { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-decoration: none; margin-left: auto; transition: color 0.2s; letter-spacing: 1px; }
    .back-link:hover { color: var(--accent); }

    /* MAIN */
    .main { max-width: 1400px; margin: 0 auto; padding: 40px; }
    .input-section { margin-bottom: 48px; }
    .input-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px; display: block; }

    /* MODEL TOGGLE */
    .toggle-wrap { margin-bottom: 20px; }
    .toggle-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; display: block; }
    .model-toggle { display: inline-flex; border: 1px solid var(--border); overflow: hidden; }

    .model-btn {
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      padding: 12px 28px; border: none; background: var(--surface); color: var(--muted);
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px;
      border-right: 1px solid var(--border); position: relative; user-select: none;
    }
    .model-btn:last-child { border-right: none; }

    /* Claude active state */
    .model-btn.active-claude {
      color: var(--claude);
      background: rgba(204,120,92,0.08);
      box-shadow: inset 0 -2px 0 var(--claude);
    }
    /* Gemini active state */
    .model-btn.active-gemini {
      color: var(--gemini);
      background: rgba(66,133,244,0.08);
      box-shadow: inset 0 -2px 0 var(--gemini);
    }
    .model-btn:hover:not(.active-claude):not(.active-gemini) { color: var(--text); background: rgba(255,255,255,0.03); }

    .model-icon { font-size: 16px; line-height: 1; }
    .model-info { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
    .model-name { font-size: 12px; font-weight: 500; line-height: 1; }
    .model-sub { font-size: 9px; opacity: 0.6; letter-spacing: 1px; line-height: 1; }

    /* INPUT */
    .input-row { display: flex; }
    .product-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border); border-right: none;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px;
      padding: 16px 20px; outline: none; transition: border-color 0.2s;
    }
    .product-input:focus { border-color: var(--accent); }
    .product-input::placeholder { color: var(--muted); }

    .analyze-btn {
      background: var(--accent); color: #0a0a08; border: none;
      font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px;
      padding: 0 36px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .analyze-btn:hover { background: #fff; }
    .analyze-btn:disabled { background: var(--muted); cursor: not-allowed; }

    /* LOADING */
    .loading { display: none; text-align: center; padding: 80px 0; }
    .loading.active { display: block; }
    .loading-pill {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 8px 20px; border-radius: 40px; margin-bottom: 24px;
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    }
    .loading-pill.claude { background: rgba(204,120,92,0.1); color: var(--claude); border: 1px solid rgba(204,120,92,0.2); }
    .loading-pill.gemini { background: rgba(66,133,244,0.1); color: var(--gemini); border: 1px solid rgba(66,133,244,0.2); }
    .loading-pill-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    .loading-bar-wrap { width: 320px; margin: 0 auto 24px; height: 2px; background: var(--border); overflow: hidden; border-radius: 2px; }
    .loading-bar { height: 100%; animation: loadbar 1.4s ease-in-out infinite; border-radius: 2px; }
    .loading-bar.claude { background: var(--claude); }
    .loading-bar.gemini { background: var(--gemini); }
    @keyframes loadbar { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
    .loading-steps { display: inline-flex; flex-direction: column; align-items: flex-start; gap: 2px; }
    .loading-step { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--border); padding: 3px 0; letter-spacing: 1px; transition: color 0.3s; }
    .loading-step.active { color: var(--muted); }
    .loading-step.done { color: var(--success); }
    .loading-step.done::before { content: '✓ '; }
    .loading-step.active::before { content: '→ '; }
    .loading-step:not(.done):not(.active)::before { content: '· '; }

    /* RESULTS */
    .results { display: none; }
    .results.active { display: block; }
    .error-box { background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2); padding: 24px; color: var(--accent2); font-family: 'DM Mono', monospace; font-size: 13px; }

    /* Model banner */
    .model-banner {
      display: inline-flex; align-items: center; gap: 10px; margin-bottom: 32px;
      padding: 8px 16px; font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 1px; border: 1px solid; border-radius: 2px;
    }
    .model-banner.claude { border-color: rgba(204,120,92,0.3); background: rgba(204,120,92,0.06); color: var(--claude); }
    .model-banner.gemini { border-color: rgba(66,133,244,0.3); background: rgba(66,133,244,0.06); color: var(--gemini); }
    .banner-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    /* Cards & layout */
    .product-hero { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 48px; padding-bottom: 32px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 20px; }
    .product-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px,8vw,100px); line-height: 0.9; color: var(--accent); letter-spacing: 2px; }
    .product-tagline { font-size: 14px; color: var(--muted); font-style: italic; max-width: 400px; line-height: 1.6; margin-top: 10px; }
    .score-badge { text-align: right; }
    .score-num { font-family: 'Bebas Neue', sans-serif; font-size: 72px; line-height: 1; }
    .score-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 4px 10px; border-radius: 2px; text-transform: uppercase; }
    .tag-green { background: rgba(77,255,145,0.1); color: var(--success); border: 1px solid rgba(77,255,145,0.2); }
    .tag-orange { background: rgba(255,107,53,0.1); color: var(--accent2); border: 1px solid rgba(255,107,53,0.2); }
    .tag-blue { background: rgba(71,184,255,0.1); color: var(--accent3); border: 1px solid rgba(71,184,255,0.2); }
    .tag-yellow { background: rgba(232,255,71,0.1); color: var(--accent); border: 1px solid rgba(232,255,71,0.2); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-bottom: 2px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; margin-bottom: 2px; }
    .card { background: var(--surface); padding: 28px; border: 1px solid var(--border); position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; }
    .card-accent-line { position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
    .card h3 { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
    .card p, .card li { font-size: 14px; line-height: 1.7; color: #c8c6c0; }
    .card ul { list-style: none; }
    .card ul li { padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; }
    .card ul li:last-child { border-bottom: none; }
    .bullet { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
    .metric { margin-bottom: 18px; }
    .metric-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-family: 'DM Mono', monospace; font-size: 11px; }
    .metric-name { color: var(--text); } .metric-value { color: var(--accent); }
    .metric-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .metric-fill { height: 100%; border-radius: 2px; transition: width 1s ease; width: 0; }
    .swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .swot-cell { padding: 20px; background: var(--surface); }
    .swot-cell h4 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; margin-bottom: 12px; }
    .swot-cell ul { list-style: none; }
    .swot-cell li { font-size: 13px; color: #c8c6c0; padding: 4px 0; line-height: 1.5; }
    .swot-s h4 { color: var(--success); } .swot-w h4 { color: var(--accent2); }
    .swot-o h4 { color: var(--accent3); } .swot-t h4 { color: #ff4747; }
    .insight-box { background: rgba(232,255,71,0.05); border: 1px solid rgba(232,255,71,0.15); padding: 20px 24px; margin-top: 16px; font-style: italic; font-size: 15px; line-height: 1.7; color: var(--accent); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr 1fr; } .main { padding: 20px; } header { padding: 0 20px; } }
    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; } .swot-grid { grid-template-columns: 1fr; }
      .input-row { flex-direction: column; } .analyze-btn { padding: 16px; }
      .model-btn { padding: 10px 16px; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">BizLens</a>
  <a href="/" class="back-link">← Home</a>
</header>

<div class="main">
  <div class="input-section">

    <!-- Model Toggle -->
    <div class="toggle-wrap">
      <span class="toggle-label">// Choose AI Model</span>
      <div class="model-toggle">
        <button class="model-btn active-claude" id="btn-claude" onclick="selectModel('claude')">
          <span class="model-icon">🤖</span>
          <div class="model-info">
            <span class="model-name">Claude Sonnet</span>
            <span class="model-sub">Anthropic</span>
          </div>
        </button>
        <button class="model-btn" id="btn-gemini" onclick="selectModel('gemini')">
          <span class="model-icon">✦</span>
          <div class="model-info">
            <span class="model-name">Gemini 1.5</span>
            <span class="model-sub">Google</span>
          </div>
        </button>
      </div>
    </div>

    <span class="input-label">// Analyze Any Product</span>
    <div class="input-row">
      <input class="product-input" id="productInput" type="text"
        placeholder="Enter a product, brand, or company (e.g. Nike, Spotify, Tesla...)">
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">ANALYZE</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-pill claude" id="loadingPill">
      <div class="loading-pill-dot"></div>
      <span id="loadingPillText">Claude Sonnet Analyzing</span>
    </div>
    <div class="loading-bar-wrap"><div class="loading-bar claude" id="loadingBar"></div></div>
    <div class="loading-steps">
      <div class="loading-step" id="step1">Researching business model</div>
      <div class="loading-step" id="step2">Mapping marketing channels</div>
      <div class="loading-step" id="step3">Scoring competitive moat</div>
      <div class="loading-step" id="step4">Building SWOT analysis</div>
    </div>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
  let selectedModel = 'claude';

  function selectModel(model) {
    selectedModel = model;
    document.getElementById('btn-claude').className = 'model-btn' + (model === 'claude' ? ' active-claude' : '');
    document.getElementById('btn-gemini').className = 'model-btn' + (model === 'gemini' ? ' active-gemini' : '');
  }

  // Auto-fill from landing page
  const preloaded = sessionStorage.getItem('bizlens_product');
  if (preloaded) {
    document.getElementById('productInput').value = preloaded;
    sessionStorage.removeItem('bizlens_product');
    setTimeout(analyze, 300);
  }

  function animateSteps() {
    const ids = ['step1','step2','step3','step4'];
    let i = 0;
    const iv = setInterval(() => {
      if (i > 0) document.getElementById(ids[i-1]).className = 'loading-step done';
      if (i < ids.length) { document.getElementById(ids[i]).className = 'loading-step active'; i++; }
      else clearInterval(iv);
    }, 750);
    return iv;
  }

  async function analyze() {
    const input = document.getElementById('productInput').value.trim();
    if (!input) return;

    const isClaude = selectedModel === 'claude';

    // Update loading UI
    const pill = document.getElementById('loadingPill');
    const bar = document.getElementById('loadingBar');
    pill.className = `loading-pill ${isClaude ? 'claude' : 'gemini'}`;
    bar.className = `loading-bar ${isClaude ? 'claude' : 'gemini'}`;
    document.getElementById('loadingPillText').textContent = isClaude ? 'Claude Sonnet Analyzing' : 'Gemini 1.5 Analyzing';
    ['step1','step2','step3','step4'].forEach(id => { document.getElementById(id).className = 'loading-step'; });

    const btn = document.getElementById('analyzeBtn');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');

    btn.disabled = true;
    loading.classList.add('active');
    results.classList.remove('active');
    results.innerHTML = '';

    const stepIv = animateSteps();

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ product: input, model: selectedModel })
      });

      clearInterval(stepIv);

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Request failed');
      }

      const d = await res.json();
      renderResults(d, selectedModel);

    } catch (err) {
      results.innerHTML = `<div class="error-box">⚠ ${err.message || 'Something went wrong. Please try again.'}</div>`;
      results.classList.add('active');
    }

    btn.disabled = false;
    loading.classList.remove('active');
  }

  function renderResults(d, model) {
    const results = document.getElementById('results');
    const scoreColor = d.businessScore >= 75 ? 'var(--success)' : d.businessScore >= 50 ? 'var(--accent)' : 'var(--accent2)';
    const catColors = ['tag-yellow','tag-blue','tag-green','tag-orange'];
    const isClaude = model === 'claude';
    const modelLabel = isClaude ? 'Claude Sonnet by Anthropic' : 'Gemini 1.5 Flash by Google';

    results.innerHTML = `
      <div class="model-banner ${isClaude ? 'claude' : 'gemini'}">
        <div class="banner-dot"></div>
        Analysis powered by ${modelLabel}
      </div>

      <div class="product-hero">
        <div>
          <div class="product-name">${d.name}</div>
          <div class="product-tagline">${d.tagline}</div>
          <div class="tags" style="margin-top:16px">
            ${(d.categoryTags||[]).map((t,i)=>`<span class="tag ${catColors[i%4]}">${t}</span>`).join('')}
            ${(d.marketTags||[]).map(t=>`<span class="tag tag-orange">${t}</span>`).join('')}
          </div>
        </div>
        <div class="score-badge">
          <div class="score-num" style="color:${scoreColor}">${d.businessScore}</div>
          <div class="score-label">Business Strength Score</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px;max-width:180px;text-align:right">${d.scoreReason}</div>
        </div>
      </div>

      <div class="grid-3">
        <div class="card" style="animation-delay:.05s">
          <div class="card-accent-line" style="background:var(--accent)"></div>
          <h3>Business Model</h3>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);margin-bottom:12px">${d.businessModel.type}</div>
          <ul>${d.businessModel.revenueStreams.map(s=>`<li><div class="bullet"></div><span>${s}</span></li>`).join('')}</ul>
          <p style="margin-top:14px;font-size:13px;color:var(--muted);border-top:1px solid var(--border);padding-top:12px">${d.businessModel.unitEconomics}</p>
        </div>
        <div class="card" style="animation-delay:.1s">
          <div class="card-accent-line" style="background:var(--accent3)"></div>
          <h3>Competitive Moat</h3>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent3);margin-bottom:12px">${d.moat.type}</div>
          <p style="font-size:13px;line-height:1.6;margin-bottom:16px">${d.moat.description}</p>
          <div class="metric">
            <div class="metric-header"><span class="metric-name">Moat Strength</span><span class="metric-value" style="color:var(--accent3)">${d.moat.strength}%</span></div>
            <div class="metric-bar"><div class="metric-fill" data-width="${d.moat.strength}" style="background:var(--accent3)"></div></div>
          </div>
        </div>
        <div class="card" style="animation-delay:.15s">
          <div class="card-accent-line" style="background:var(--accent2)"></div>
          <h3>Pricing Strategy</h3>
          <p style="font-size:14px;line-height:1.7;margin-bottom:16px">${d.pricingStrategy}</p>
          <h3 style="margin-top:16px">Growth Strategy</h3>
          <ul>${d.growthStrategy.map(s=>`<li><div class="bullet" style="background:var(--accent2)"></div><span>${s}</span></li>`).join('')}</ul>
        </div>
      </div>

      <div class="grid-2">
        <div class="card" style="animation-delay:.2s">
          <div class="card-accent-line" style="background:var(--success)"></div>
          <h3>Marketing Intelligence</h3>
          <p style="margin-bottom:12px;font-size:13px;color:var(--muted)">Positioning: <span style="color:var(--text)">${d.marketing.positioning}</span></p>
          <p style="margin-bottom:12px;font-size:13px;color:var(--muted)">Target: <span style="color:var(--text)">${d.marketing.targetAudience}</span></p>
          <p style="margin-bottom:16px;font-size:13px;font-style:italic;color:var(--accent)">"${d.marketing.keyMessage}"</p>
          <h3>Channels</h3>
          <div class="tags">${d.marketing.primaryChannels.map(c=>`<span class="tag tag-green">${c}</span>`).join('')}</div>
          <h3 style="margin-top:16px">Key Tactics</h3>
          <ul>${d.marketing.tactics.map(t=>`<li><div class="bullet" style="background:var(--success)"></div><span>${t}</span></li>`).join('')}</ul>
        </div>
        <div class="card" style="animation-delay:.25s">
          <div class="card-accent-line" style="background:var(--accent)"></div>
          <h3>Business Metrics</h3>
          ${d.metrics.map(m=>`
            <div class="metric">
              <div class="metric-header"><span class="metric-name">${m.name}</span><span class="metric-value">${m.value}%</span></div>
              <div class="metric-bar"><div class="metric-fill" data-width="${m.value}" style="background:linear-gradient(90deg,var(--accent),var(--success))"></div></div>
            </div>
          `).join('')}
          <h3 style="margin-top:20px">Competitive Edge</h3>
          <p style="font-size:13px;line-height:1.7">${d.competitiveAdvantage}</p>
        </div>
      </div>

      <div class="card" style="margin-bottom:2px;animation-delay:.3s">
        <div class="card-accent-line" style="background:#ff4747"></div>
        <h3>SWOT Analysis</h3>
        <div class="swot-grid">
          <div class="swot-cell swot-s"><h4>Strengths</h4><ul>${d.swot.strengths.map(s=>`<li>→ ${s}</li>`).join('')}</ul></div>
          <div class="swot-cell swot-w"><h4>Weaknesses</h4><ul>${d.swot.weaknesses.map(s=>`<li>→ ${s}</li>`).join('')}</ul></div>
          <div class="swot-cell swot-o"><h4>Opportunities</h4><ul>${d.swot.opportunities.map(s=>`<li>→ ${s}</li>`).join('')}</ul></div>
          <div class="swot-cell swot-t"><h4>Threats</h4><ul>${d.swot.threats.map(s=>`<li>→ ${s}</li>`).join('')}</ul></div>
        </div>
      </div>

      <div class="card" style="animation-delay:.35s">
        <div class="card-accent-line" style="background:var(--accent)"></div>
        <h3>🔍 Key Strategic Insight</h3>
        <div class="insight-box">${d.keyInsight}</div>
      </div>
    `;

    results.classList.add('active');
    setTimeout(() => {
      document.querySelectorAll('.metric-fill').forEach(el => { el.style.width = el.dataset.width + '%'; });
    }, 100);
  }

  document.getElementById('productInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') analyze();
  });
</script>
</body>
</html>
